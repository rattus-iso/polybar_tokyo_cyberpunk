[global/wm]
margin-bottom = 0
margin-top = 0

; includes
include-file = ~/.config/polybar/polybar_tokyo_cyberpunk/bars.ini
include-file = ~/.config/polybar/polybar_tokyo_cyberpunk/colors.ini
include-file = ~/.config/polybar/polybar_tokyo_cyberpunk/glyphs.ini
include-file = ~/.config/polybar/polybar_tokyo_cyberpunk/modules.ini
include-file = ~/.config/polybar/polybar_tokyo_cyberpunk/user_modules.ini

[bar/main]
width = 100%
height = 42
offset-x = 0%
offset-y = 0%
wm-restack = i3
override-redirect = false
dock = true


background = ${color.background}
foreground = ${color.foreground}

fixed-center = true
bottom = false

radius-top = 0.0
radius-bottom = 0.0

underline-size = 2
underline-color = ${color.foreground}

border-size = 0
padding = 0
module-margin-left = 0
module-margin-right = 0

; fonts
font-0 = "Terminus:size=15;3"
font-1 = "waffle:size=30;3"
font-2 = "Iosevka Nerd Font:size=24;5"
font-3 = "Iosevka Nerd Font:size=24;6"
font-4 = "Symbols Nerd Font:size=24"


; modules
modules-left = title left2
modules-center = workspaces
modules-right = right7  right6  right5 pulseaudio right4 battery right3 network right2 date right1 sysmenu
separator =


enable-ipc = true

[settings]
throttle-output = 5
throttle-output-for = 10
screenchange-reload = false

compositing-background = source
compositing-foreground = over

pseudo-transparency = false
